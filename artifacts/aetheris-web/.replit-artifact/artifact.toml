kind = "web"
previewPath = "/"
title = "AETHERIS Frontend"
version = "1.0.0"
id = "artifacts/aetheris-web"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23625

[services.development]
run = "pnpm --filter @workspace/aetheris-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aetheris-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/aetheris-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23625"
BASE_PATH = "/"

# ============================================================
# AETHERIS — Configuración de la aplicación
# ============================================================

spring.application.name=aetheris-backend

# ------------------------------------------------------------
# Base de datos — MariaDB (AlwaysData)
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-roberth.alwaysdata.net}:3306/${MYSQL_DATABASE:roberth_is}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:roberth}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Servidor
# ------------------------------------------------------------
server.port=${PORT:8080}
server.servlet.context-path=/api

# ------------------------------------------------------------
# JWT
# ------------------------------------------------------------
aetheris.jwt.secret=${JWT_SECRET}
aetheris.jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}

# ------------------------------------------------------------
# Sesión
# ------------------------------------------------------------
aetheris.sesion.inactividad-minutos=${SESION_INACTIVIDAD_MIN:30}

# ------------------------------------------------------------
# CORS
# ------------------------------------------------------------
aetheris.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.aetheris=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ------------------------------------------------------------
# ARIA — Chatbot financiero (Groq / Llama)
# Definir en Railway: GROQ_API_KEY=<tu_api_key_de_groq>
# Key gratuita en: https://console.groq.com
# ------------------------------------------------------------
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

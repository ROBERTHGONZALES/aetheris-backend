# ============================================================
# AETHERIS — Configuración de la aplicación
# ============================================================

spring.application.name=aetheris-backend

# ------------------------------------------------------------
# Base de datos — MariaDB (AlwaysData)
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-roberth.alwaysdata.net}:3306/${MYSQL_DATABASE:roberth_is}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:roberth}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Servidor
# ------------------------------------------------------------
server.port=${PORT:8080}
server.servlet.context-path=/api

# ------------------------------------------------------------
# JWT
# ------------------------------------------------------------
aetheris.jwt.secret=${JWT_SECRET}
aetheris.jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}

# ------------------------------------------------------------
# Sesión
# ------------------------------------------------------------
aetheris.sesion.inactividad-minutos=${SESION_INACTIVIDAD_MIN:30}

# ------------------------------------------------------------
# CORS
# ------------------------------------------------------------
aetheris.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.aetheris=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ------------------------------------------------------------
# ARIA — Proveedores de IA con fallback automático
#
# Orden de intento: groq → gemini → openrouter (configurable)
# Si un proveedor falla (429, timeout, error), pasa al siguiente.
#
# Claves en Railway:
#   GROQ_API_KEY       → https://console.groq.com          (gratuito)
#   GEMINI_API_KEY     → https://aistudio.google.com       (gratuito)
#   OPENROUTER_API_KEY → https://openrouter.ai             (gratuito)
# ------------------------------------------------------------

# Groq — proveedor principal (Llama 3.3 70B)
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# Gemini — respaldo #1
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# OpenRouter — respaldo #2 (compatible con OpenAI)
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:meta-llama/llama-3.3-70b-instruct:free}

# Orden de fallback (modificar en Railway si se quiere cambiar prioridad)
aria.provider.order=${ARIA_PROVIDER_ORDER:groq,gemini,openrouter}

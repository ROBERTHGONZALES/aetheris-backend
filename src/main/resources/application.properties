# ============================================================
# AETHERIS — Configuración de la aplicación
# ============================================================

spring.application.name=aetheris-backend

# ------------------------------------------------------------
# Base de datos — MariaDB (AlwaysData)
# Credenciales cargadas desde variables de entorno.
# Definir antes de arrancar:
#   export MYSQL_HOST=mysql-roberth.alwaysdata.net
#   export MYSQL_DATABASE=roberth_is
#   export MYSQL_USER=roberth
#   export MYSQL_PASSWORD=<tu_password>
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-roberth.alwaysdata.net}:3306/${MYSQL_DATABASE:roberth_is}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:roberth}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
# validate = valida el esquema sin modificarlo (las tablas ya existen)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Servidor
# ------------------------------------------------------------
server.port=${SPRING_PORT:8000}
server.servlet.context-path=/api

# ------------------------------------------------------------
# JWT
# Definir: export JWT_SECRET=<clave_minimo_64_caracteres>
# ------------------------------------------------------------
aetheris.jwt.secret=${JWT_SECRET}
aetheris.jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}

# ------------------------------------------------------------
# Tiempo de inactividad de sesión (minutos)
# ------------------------------------------------------------
aetheris.sesion.inactividad-minutos=${SESION_INACTIVIDAD_MIN:30}

# ------------------------------------------------------------
# CORS
# ------------------------------------------------------------
aetheris.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.aetheris=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
